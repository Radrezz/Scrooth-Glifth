<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk | Scrooth Glifth</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Italiana&family=Marcellus&family=Tenor+Sans&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">

    <!-- GSAP & Lenis -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <link rel="shortcut icon" href="favicon/favicon.ico">

    <style>
        .detail-hero {
            min-height: 80vh;
            display: flex;
            align-items: center;
            padding: 150px 0 100px;
            background: var(--bg);
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 6rem;
            align-items: start;
        }

        .detail-image-box {
            position: sticky;
            top: 120px;
            background: var(--white);
            padding: 1.5rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        .detail-image-box img {
            width: 100%;
            height: auto;
            object-fit: cover;
            display: block;
        }

        .detail-info {
            padding: 1rem 0;
        }

        .detail-title {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            line-height: 1.1;
            margin-bottom: 2rem;
            font-family: var(--font-heading);
        }

        .detail-desc {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 3rem;
            line-height: 1.8;
            opacity: 0.8;
        }

        .feature-list {
            list-style: none;
            margin-bottom: 4rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .feature-item i {
            color: var(--accent);
            width: 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            transition: 0.3s;
        }

        .back-btn:hover {
            transform: translateX(-10px);
        }

        .detail-actions {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        @media (max-width: 1024px) {
            .detail-grid {
                grid-template-columns: 1fr;
                gap: 4rem;
            }

            .detail-image-box {
                position: relative;
                top: 0;
            }
        }
    </style>
</head>

<body>
    <!-- Preloader -->
    <div id="preloader" class="preloader">
        <div class="preloader-content">
            <div class="preloader-logo-wrapper">
                <img src="assets/images/ScroothGlifth-Transparent.png" alt="Scrooth Glifth" class="preloader-logo">
            </div>
            <div class="preloader-progress">
                <div class="preloader-bar"></div>
            </div>
            <span class="preloader-text">Crafting Your Moments</span>
        </div>
    </div>

    <div class="spotlight"></div>

    <!-- Floating Nav Toggle -->
    <div class="nav-floating-toggle" id="nav-open-trigger">
        <span class="toggle-logo"><img src="assets/images/ScroothGlifth-Transparent.png" alt="SG"
                style="height: 1.5rem; width: auto; object-fit: contain;"></span>
    </div>

    <!-- Side Navbar -->
    <nav class="side-nav" id="sidebar">
        <div class="nav-header">
            <a href="index.html" class="logo"><img src="assets/images/ScroothGlifth-Transparent.png"
                    alt="Scrooth Glifth" style="height: 2.5rem; width: auto; object-fit: contain;"></a>
            <button class="menu-close-btn" id="nav-close-trigger"><i data-lucide="minimize-2"></i></button>
        </div>
        <ul class="nav-items">
            <li><a href="index.html#home" class="nav-item" data-tooltip="Beranda"><i
                        data-lucide="house"></i><span>Beranda</span></a></li>
            <li><a href="index.html#bio" class="nav-item" data-tooltip="Filosofi"><i
                        data-lucide="sparkles"></i><span>Filosofi</span></a></li>
            <li><a href="index.html#catalog" class="nav-item active" data-tooltip="Koleksi"><i
                        data-lucide="layout-grid"></i><span>Koleksi</span></a></li>
            <li><a href="index.html#payment" class="nav-item" data-tooltip="Transaksi"><i
                        data-lucide="wallet-cards"></i><span>Transaksi</span></a></li>
            <li><a href="index.html#contact" class="nav-item" data-tooltip="Kontak"><i
                        data-lucide="feather"></i><span>Kontak</span></a></li>
        </ul>
        <div class="nav-footer"></div>
    </nav>

    <main class="detail-hero">
        <div class="container">
            <a href="index.html#catalog" class="back-btn"><i data-lucide="arrow-left"></i> Kembali ke Katalog</a>

            <div class="detail-grid">
                <div class="detail-image-box detail-entrance-img">
                    <img id="product-img" src="" alt="Product Detail">
                </div>

                <div class="detail-info detail-entrance-info">
                    <span class="section-tag" id="product-tag">Undangan Digital</span>
                    <h1 class="detail-title" id="product-title">Loading...</h1>
                    <p class="detail-desc" id="product-desc"></p>
                    <div id="product-price" class="product-price"
                        style="justify-content: flex-start; margin-bottom: 2.5rem;">
                        <span class="price-prefix"></span>
                        <span class="price-old"></span>
                        <span class="price-new" style="font-size: 2.2rem;"></span>
                        <div class="price-note"></div>
                    </div>

                    <ul class="feature-list" id="feature-list">
                        <!-- Features populated by JS -->
                    </ul>

                    <div class="detail-actions">
                        <a href="#" id="demo-link" target="_blank" class="btn btn-primary">Lihat Demo Langsung</a>
                        <button id="order-now-btn" class="btn btn-outline"
                            style="border: 1px solid var(--accent); color: var(--accent);">Pesan Sekarang</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer section-padding">
        <div class="container text-center">
            <p>&copy; 2026 Scrooth Glifth. Seluruh Hak Cipta Dilindungi.</p>
        </div>
    </footer>

    <!-- Checkout Modal Indicator -->
    <div id="checkout-modal" class="checkout-modal">
        <div class="checkout-info">
            <span id="cart-item-name">Tidak ada pesanan</span>
            <small>Hanya 1 transaksi diperbolehkan</small>
        </div>
        <a href="" id="final-checkout-btn" class="checkout-btn" target="_blank">Checkout</a>
        <button id="clear-cart">Hapus</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script>
        // Lenis Smooth Scroll
        const lenis = new Lenis({ duration: 1.8, smoothWheel: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // GSAP ScrollTrigger
        gsap.registerPlugin(ScrollTrigger);

        // Navbar Toggle (pure CSS class, no GSAP conflict)
        const sidebar = document.getElementById('sidebar');
        const navOpenBtn = document.getElementById('nav-open-trigger');
        const navCloseBtn = document.getElementById('nav-close-trigger');
        const mainEl = document.querySelector('main.detail-hero');
        const footerEl = document.querySelector('footer.footer');

        function toggleSidebar(isCollapsed) {
            sidebar.classList.toggle('collapsed', isCollapsed);
            document.body.classList.toggle('nav-collapsed', isCollapsed);

            if (window.innerWidth <= 1024) {
                if (isCollapsed) sidebar.classList.remove('active');
                else sidebar.classList.add('active');
            }

            navOpenBtn.classList.toggle('visible', isCollapsed);
        }

        if (navCloseBtn) navCloseBtn.addEventListener('click', () => toggleSidebar(true));
        if (navOpenBtn) navOpenBtn.addEventListener('click', () => toggleSidebar(false));

        // Close sidebar on mobile load
        if (window.innerWidth <= 1024) {
            toggleSidebar(true);
        }

        // Spotlight
        const spotlight = document.querySelector('.spotlight');
        window.addEventListener('mousemove', (e) => {
            gsap.to(spotlight, { x: e.clientX, y: e.clientY, xPercent: -50, yPercent: -50, duration: 1.2, ease: "power2.out" });
        });

        // Product Data
        const products = {
            undangan: [
                { name: "Model 01", desc: "Desain undangan digital yang abadi dengan sentuhan tipografi klasik dan elemen formal. Cocok untuk pernikahan dengan konsep tradisional maupun internasional yang mewah.", img: "assets/images/undangan/template1.png", link: "https://undangan1-scroothglifth.netlify.app/", features: ["RSVP Management", "Interactive Audio", "Google Maps Integration", "Guest Greeting", "Digital Envelope", "Wedding Story"], oldPrice: "50.000", newPrice: "30.000", note: "berlaku hingga 12 april 2026" },
                { name: "Model 02", desc: "Gaya kontemporer yang bersih dengan fokus pada whitespace dan layout minimalis. Pilihan tepat bagi pasangan yang menginginkan tampilan modern dan profesional.", img: "assets/images/undangan/template2.png", link: "https://undangan2-scroothglifth.netlify.app/", features: ["Dark/Light Mode", "Animated Gallery", "Wish Walls", "Countdown Timer", "Music Background", "Custom Color Scheme"], oldPrice: "50.000", newPrice: "30.000", note: "berlaku hingga 12 april 2026" },
                { name: "Model 03", desc: "Menceritakan perjalanan cinta Anda melalui pengalaman scroll yang imersif dan interaktif. Setiap gerakan mengaktifkan elemen baru yang mempesona.", img: "assets/images/undangan/template3.png", link: "https://undangan3-scroothglifth.netlify.app/", features: ["GSAP Animations", "Full Storytelling", "Custom Illustrations", "Multi-device Layout", "Parallax Effects", "Auto-play Features"], oldPrice: "50.000", newPrice: "30.000", note: "berlaku hingga 12 april 2026" },
                { name: "Model 04", desc: "Kombinasi antara kesederhanaan desain dan aksen emas yang memberikan kesan mewah namun tetap rendah hati dan elegan.", img: "assets/images/undangan/template4.png", link: "https://undangan4-scroothglifth.netlify.app/", features: ["Gold Foiling Effect", "Simplified Navigation", "Direct WhatsApp RSVP", "High Precision Design", "Custom Icons", "Fast Load System"], oldPrice: "50.000", newPrice: "30.000", note: "berlaku hingga 12 april 2026" },
                { name: "Model 05", desc: "Tampilan editorial layaknya sebuah majalah seni. Memberikan ruang bagi foto-foto Anda untuk berbicara dalam tata letak yang artistik.", img: "assets/images/undangan/template5.png", link: "https://undangan5-scroothglifth.netlify.app/", features: ["Artistic Layout", "Gallery High-Res", "Dynamic Typography", "Unique Navigators", "Magazine Style", "Smooth Transitions"], oldPrice: "50.000", newPrice: "30.000", note: "berlaku hingga 12 april 2026" }
            ],
            gift: [
                { name: "ProfileBirthday-Template", desc: "Pengalaman digital unik dalam bentuk buku interaktif. Cocok untuk hadiah kejutan yang bisa dipersonalisasi dengan foto dan pesan mengharukan.", img: "assets/images/fun-gift/gift1.png", link: "https://profilebirthday-template.vercel.app/", features: ["Flipping Book Logic", "Photo Album Layout", "Surprise Reveal", "Background Music", "Direct Greetings", "Interactive Mini-games"], prefix: "Mulai dari ", oldPrice: "60.000", newPrice: "40.000" }
            ]
        };

        window.addEventListener('load', () => {
            // Load product data
            const urlParams = new URLSearchParams(window.location.search);
            const id = parseInt(urlParams.get('id')) || 0;
            const type = urlParams.get('type') || 'undangan';
            const product = products[type]?.[id];

            if (product) {
                document.getElementById('product-title').innerText = product.name;
                document.getElementById('product-desc').innerText = product.desc;
                document.getElementById('product-img').src = product.img;
                document.getElementById('demo-link').href = product.link;
                document.getElementById('product-tag').innerText = type === 'undangan' ? 'Undangan Digital' : 'Surprise Gift';
                const list = document.getElementById('feature-list');
                product.features.forEach(f => {
                    const li = document.createElement('li');
                    li.className = 'feature-item';
                    li.innerHTML = `<i data-lucide="check-circle-2"></i> ${f}`;
                    list.appendChild(li);
                });

                // Update Price
                const priceContainer = document.getElementById('product-price');
                if (priceContainer) {
                    const prefixEl = priceContainer.querySelector('.price-prefix');
                    const oldEl = priceContainer.querySelector('.price-old');
                    const newEl = priceContainer.querySelector('.price-new');
                    const noteEl = priceContainer.querySelector('.price-note');

                    if (prefixEl) prefixEl.innerText = product.prefix || '';
                    if (oldEl) oldEl.innerText = product.oldPrice ? `Rp${product.oldPrice}` : '';
                    if (newEl) newEl.innerText = product.newPrice ? `Rp${product.newPrice}` : '';
                    if (noteEl) noteEl.innerText = product.note || '';
                }

                lucide.createIcons();
            }

            // CART LOGIC (Persistent)
            let currentCart = JSON.parse(localStorage.getItem('scrooth_cart')) || null;

            function updateCartUI() {
                const checkoutModal = document.getElementById('checkout-modal');
                const cartItemName = document.getElementById('cart-item-name');
                const finalCheckoutBtn = document.getElementById('final-checkout-btn');

                if (!currentCart) {
                    if (checkoutModal) checkoutModal.classList.remove('active');
                    if (cartItemName) cartItemName.innerText = "Tidak ada pesanan";
                } else {
                    if (checkoutModal) checkoutModal.classList.add('active');
                    if (cartItemName) cartItemName.innerText = currentCart.name;

                    const waMsg = encodeURIComponent(`Halo Scrooth Glifth, saya ingin memesan model berikut:
Model: ${currentCart.name} (${currentCart.type})
Link: https://scroothglifth.vercel.app/detail.html?id=${currentCart.id || 0}&type=${currentCart.type}`);

                    if (finalCheckoutBtn) {
                        finalCheckoutBtn.setAttribute('href', `https://wa.me/62895337858815?text=${waMsg}`);
                    }
                }
                localStorage.setItem('scrooth_cart', JSON.stringify(currentCart));
            }

            function showPremiumToast(message) {
                const toast = document.createElement('div');
                toast.className = 'premium-toast';
                toast.innerHTML = `
                    <div class="toast-content">
                        <i data-lucide="check-circle" style="color: #B17457; width: 20px;"></i>
                        <span>${message}</span>
                    </div>
                `;
                document.body.appendChild(toast);
                lucide.createIcons();
                gsap.fromTo(toast, { y: 50, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: "expo.out" });
                setTimeout(() => {
                    gsap.to(toast, { y: -20, opacity: 0, duration: 0.6, ease: "power2.in", onComplete: () => toast.remove() });
                }, 3000);
            }

            // Order Button Click
            const orderBtn = document.getElementById('order-now-btn');
            if (orderBtn) {
                orderBtn.addEventListener('click', () => {
                    currentCart = {
                        id: id,
                        type: type,
                        name: product.name
                    };
                    updateCartUI();
                    showPremiumToast(`${product.name} telah disimpan ke pesanan Anda`);
                });
            }

            // Clear Cart
            const clearCartBtn = document.getElementById('clear-cart');
            if (clearCartBtn) {
                clearCartBtn.addEventListener('click', () => {
                    currentCart = null;
                    updateCartUI();
                });
            }

            updateCartUI();

            // --------------------------------------------------------------------------
            // Preloader & Entrance Animation (Matching index.html)
            // --------------------------------------------------------------------------
            function initPreloader() {
                const preloader = document.getElementById('preloader');
                if (!preloader) return;
                const tl = gsap.timeline();
                tl.to('.preloader-bar', { x: '0%', duration: 1.6, ease: "power2.inOut" })
                    .to('.preloader-content', { opacity: 0, y: -60, duration: 1.2, ease: "power2.in" })
                    .to(preloader, {
                        yPercent: -100, duration: 1.2, ease: "expo.inOut",
                        onStart: () => initLoadAnimations(),
                        onComplete: () => { preloader.style.display = 'none'; }
                    }, "-=1.0");
            }

            function initLoadAnimations() {
                gsap.set('.side-nav', { x: -100 });
                gsap.set('.detail-entrance-img', { opacity: 0, x: -60, scale: 0.95 });
                gsap.set('.detail-entrance-info > *', { opacity: 0, y: 40 });

                const tl = gsap.timeline({ defaults: { ease: "expo.out" } });
                tl.to('.side-nav', { x: 0, duration: 1.5 }, 0)
                    .call(() => gsap.set('.side-nav', { clearProps: 'x,transform' }))
                    .to('.detail-entrance-img', { opacity: 1, x: 0, scale: 1, duration: 2, ease: "power3.out" }, 0.4)
                    .to('.detail-entrance-info > *', { opacity: 1, y: 0, duration: 1.2, stagger: 0.12 }, 0.8);
            }

            initPreloader();
        });
    </script>
</body>

</html>
